<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBONARIUM · MULTI HUB</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030305;
            --accent: #d4af37;
            --glass: rgba(0, 10, 20, 0.7);
            --border: rgba(212, 175, 55, 0.2);

            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
            scroll-snap-type:y mandatory;
        }

        body{
            width:100%;
            overflow-x:hidden;
            background:var(--bg);
            font-family:var(--font-main);
            color:white;
        }

        .hub-container{
            width:100%;
        }

        section{
            width:100%;
            height:100vh;
            position:relative;
            overflow:hidden;

            scroll-snap-align:start;
            scroll-snap-stop:always;

            background:#000;
        }

        iframe{
            width:100%;
            height:100%;
            border:none;
            display:block;
            background:#000;
        }

        /* smooth fade between sections */
        section::after{
            content:"";
            position:absolute;
            bottom:0;
            left:0;
            width:100%;
            height:120px;
            pointer-events:none;

            background:linear-gradient(
                to bottom,
                rgba(0,0,0,0),
                rgba(0,0,0,0.65)
            );
        }

        /* custom scrollbar */
        body::-webkit-scrollbar{
            width:6px;
        }

        body::-webkit-scrollbar-track{
            background:#06020a;
        }

        body::-webkit-scrollbar-thumb{
            background:var(--border);
            border-radius:10px;
        }

        /* mobile optimization */
        @media (max-width: 768px){

            section{
                height:100svh;
            }

            iframe{
                min-height:100svh;
            }
        }
    </style>
</head>

<body>

<div class="hub-container">

    <!-- PAGE 1 -->
    <section id="sunset">
        <iframe
            src="https://lavandaaudit.github.io/ibonarium.sanset.now/"
            title="IBONARIUM SUNSET NOW"
            loading="eager"
            scrolling="yes">
        </iframe>
    </section>

    <!-- PAGE 2 -->
    <section id="statist">
        <iframe
            src="https://lavandaaudit.github.io/statist/"
            title="IBONARIUM STATIST"
            loading="lazy"
            scrolling="yes">
        </iframe>
    </section>

    <!-- PAGE 3 -->
    <section id="telescope">
        <iframe
            src="https://lavandaaudit.github.io/tele.lab.telescope/"
            title="IBONARIUM TELE LAB"
            loading="lazy"
            scrolling="yes">
        </iframe>
    </section>

</div>

</body>
</html>
